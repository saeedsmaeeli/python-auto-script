name: Run News Script

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libraries
        run: pip install requests beautifulsoup4

      - name: Run script
        env:
          API_KEY_DEEPSEEK: ${{ secrets.API_KEY_DEEPSEEK }}
        run: python news.py
